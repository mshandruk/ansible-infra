---
# tasks file for roles/bootstrap

- name: Create user "{{ bootstrap_user }}"
  ansible.builtin.user:
    name: "{{ bootstrap_user }}"
    shell: /bin/bash
    create_home: yes

- name: Install SSH pulic key
  ansible.posix.authorized_key:
    user: "{{ bootstrap_user }}"
    state: present
    key: "{{ lookup('file', bootstrap_ssh_key_path) }}"

- name: Install sudo on Debian family
  import_tasks: debian.yml
  when: ansible_os_family == 'Debian'

- name: Configure sudo for user {{ bootstrap_user }}
  ansible.builtin.template:
    src: sudoers.j2
    dest: /etc/sudoers.d/{{ bootstrap_user }}
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
